<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>U.S. Economic Indicators</title>
<meta name="description" content="The latest official U.S. inflation, jobs, and wage data, charted as it's released." />
<style>
  :root {
    --bg:#F5F6F8; --panel:#fff; --ink:#13161D; --muted:#626B7B; --faint:#8A92A1;
    --hair:#E5E8ED; --blue:#1B3B6F; --blueSoft:#5B7DB1; --clay:#B45309; --good:#0B7A4B; --bad:#B42318;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
    --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --display:Georgia,"Iowan Old Style","Times New Roman",serif;
  }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--body); }
  .wrap { max-width:1120px; margin:0 auto; padding:34px 22px 60px; }
  .eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); }
  .head { display:flex; justify-content:space-between; align-items:flex-start; gap:24px; flex-wrap:wrap; }
  .head h1 { font-family:var(--display); font-weight:600; font-size:30px; line-height:1.08; margin:10px 0 4px; letter-spacing:-.01em; }
  .head p { font-size:14.5px; color:var(--muted); margin:0; max-width:620px; }
  .head-meta { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--good); display:inline-block; animation:pulse 2.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(11,122,75,.45);} 70%{box-shadow:0 0 0 7px rgba(11,122,75,0);} 100%{box-shadow:0 0 0 0 rgba(11,122,75,0);} }
  .refresh { display:inline-flex; align-items:center; gap:7px; font-family:var(--body); font-size:13px; font-weight:500; color:var(--ink); background:#fff; border:1px solid var(--hair); border-radius:8px; padding:8px 13px; cursor:pointer; }
  .refresh:hover { border-color:var(--blueSoft); }
  .refresh:disabled { opacity:.6; cursor:default; }
  .spin { animation:spin 1s linear infinite; transform-origin:center; }
  @keyframes spin { to { transform:rotate(360deg);} }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(248px,1fr)); gap:14px; margin-top:26px; }
  .card { background:var(--panel); border:1px solid var(--hair); border-radius:14px; padding:18px 18px 16px; }
  .main { margin-top:16px; padding:8px 20px 22px; }
  .kpi-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .kpi-src { font-family:var(--mono); font-size:10.5px; color:var(--faint); }
  .kpi-val { font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:34px; line-height:1; font-weight:600; color:var(--ink); letter-spacing:-.01em; margin-top:10px; }
  .kpi-delta { display:flex; align-items:center; gap:8px; margin-top:8px; height:18px; }
  .kpi-delta .lbl { font-size:12px; color:var(--muted); }
  .delta { display:inline-flex; align-items:center; gap:3px; font-family:var(--mono); font-size:12.5px; font-variant-numeric:tabular-nums; }
  .kpi-asof { margin-top:8px; font-family:var(--mono); font-size:10.5px; color:var(--faint); }
  .spark { margin-top:12px; height:34px; }
  .rise { opacity:0; transform:translateY(8px); animation:rise .5s ease forwards; }
  @keyframes rise { to { opacity:1; transform:none; } }
  .skeleton { height:168px; background:linear-gradient(100deg,#fff 30%,#eef1f5 50%,#fff 70%); background-size:200% 100%; animation:sk 1.3s infinite; }
  @keyframes sk { to { background-position:-200% 0; } }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--hair); margin:0 -20px 18px; padding:8px 20px 0; }
  .tab { font-family:var(--body); font-size:14px; font-weight:500; color:var(--muted); background:none; border:none; padding:9px 4px; margin-right:18px; cursor:pointer; border-bottom:2px solid transparent; }
  .tab:hover { color:var(--ink); }
  .tab.on { color:var(--blue); border-bottom-color:var(--blue); }
  .ctrl-row { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
  .ctrl-note { font-size:13px; color:var(--muted); }
  .seg { display:inline-flex; background:#F0F2F6; border-radius:9px; padding:3px; gap:2px; }
  .seg button { font-family:var(--mono); font-size:12px; color:var(--muted); background:none; border:none; padding:6px 12px; border-radius:7px; cursor:pointer; }
  .seg button:hover { color:var(--ink); }
  .seg button.on { background:#fff; color:var(--blue); box-shadow:0 1px 2px rgba(19,22,29,.08); font-weight:600; }
  .chart { position:relative; width:100%; }
  .chart svg { display:block; width:100%; }
  .chart-tip { position:absolute; pointer-events:none; background:#fff; border:1px solid var(--hair); border-radius:8px; padding:8px 10px; box-shadow:0 6px 24px rgba(19,22,29,.10); font-family:var(--body); font-size:12.5px; z-index:5; white-space:nowrap; transition:opacity .08s; }
  .tip-h { font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:4px; }
  .tip-r { display:flex; align-items:center; gap:7px; }
  .tip-dot { width:8px; height:8px; border-radius:2px; display:inline-block; }
  .tip-v { margin-left:auto; padding-left:16px; font-family:var(--mono); color:var(--ink); font-variant-numeric:tabular-nums; }
  .legend { display:flex; gap:18px; flex-wrap:wrap; margin-top:10px; }
  .legend span { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; color:var(--muted); }
  .legend i { width:14px; height:3px; border-radius:2px; display:inline-block; }
  .readout { font-family:var(--display); font-size:16px; line-height:1.5; color:var(--ink); border-left:3px solid var(--blue); padding-left:14px; margin:22px 0 4px; }
  .foot { margin-top:34px; border-top:1px solid var(--hair); padding-top:22px; }
  .foot-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:28px; }
  .foot-p { font-size:13px; line-height:1.6; color:var(--muted); margin:8px 0 0; }
  .foot-note { font-size:12px; color:var(--faint); margin-top:22px; }
  .link { color:var(--blue); text-decoration:none; font-weight:500; }
  .link:hover { text-decoration:underline; }
  .errbox { border:1px solid #F0C9C4; background:#FCF4F3; border-radius:14px; padding:18px; margin-top:18px; display:flex; gap:10px; }
  .errbox h3 { margin:0 0 4px; font-size:14px; color:var(--ink); }
  .errbox p { margin:0; font-size:13.5px; color:var(--muted); line-height:1.5; }
  .errbox .row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  .key-input { font-family:var(--mono); font-size:12.5px; padding:8px 11px; border:1px solid var(--hair); border-radius:8px; min-width:200px; outline:none; }
  .key-input:focus { border-color:var(--blueSoft); }
  button:focus-visible, .key-input:focus-visible, a:focus-visible { outline:2px solid var(--blueSoft); outline-offset:2px; }
  @media (prefers-reduced-motion:reduce){ .rise,.dot,.spin,.skeleton{ animation:none!important; opacity:1!important; transform:none!important; } }
  @media (max-width:560px){ .head-meta{ align-items:flex-start; } .head h1{ font-size:25px; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
window.addEventListener("error", function (e) {
  var r = document.getElementById("root");
  if (r && !r.dataset.ok) {
    r.innerHTML = '<div style="padding:24px;font-family:ui-monospace,monospace;font-size:13px;color:#B42318;white-space:pre-wrap">The page hit an error while loading:\n\n' +
      ((e && e.message) ? e.message : "unknown error") + '</div>';
  }
});

/* ----------------------------- config ----------------------------- */
var C = { bg:"#F5F6F8", ink:"#13161D", muted:"#626B7B", faint:"#8A92A1", hair:"#E5E8ED",
  blue:"#1B3B6F", blueSoft:"#5B7DB1", clay:"#B45309", good:"#0B7A4B", bad:"#B42318" };
var MONO = 'ui-monospace,"SF Mono",Menlo,monospace';
var SERIES = {
  cpiHeadlineNSA:"CUUR0000SA0", cpiHeadlineSA:"CUSR0000SA0",
  cpiCoreNSA:"CUUR0000SA0L1E", cpiCoreSA:"CUSR0000SA0L1E",
  unrate:"LNS14000000", payrolls:"CES0000000001", ahe:"CES0500000003", partRate:"LNS11300000"
};
var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function reduced(){ return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; }

var state = { status:"loading", errMsg:"", raw:null, model:null, kpis:[], tab:"inflation", range:60, inflMode:"yoy", apiKey:"", updatedAt:null };

/* ----------------------------- data ----------------------------- */
function fetchData(){
  return fetch("/api/bls").then(function(res){
    if (!res.ok) throw new Error("Data service returned " + res.status);
    return res.json();
  }).then(function(json){
    if (json.status !== "REQUEST_SUCCEEDED")
      throw new Error((json.message && json.message.join(" ")) || "request was not successful");
    return json.Results.series;
  });
}
function parseSeries(arr, id){
  var s = null;
  for (var i=0;i<arr.length;i++){ if (arr[i].seriesID === id){ s = arr[i]; break; } }
  if (!s) return [];
  return s.data.filter(function(d){ return /^M(0[1-9]|1[0-2])$/.test(d.period); })
    .map(function(d){
      var m = parseInt(d.period.slice(1),10);
      return { key:d.year + "-" + (m<10?"0"+m:""+m), date:new Date(Number(d.year), m-1, 1), value:parseFloat(d.value) };
    })
    .filter(function(d){ return isFinite(d.value); })
    .sort(function(a,b){ return a.date - b.date; });
}
function pad2(n){ return n<10 ? "0"+n : ""+n; }
function indexByKey(a){ var m={}; a.forEach(function(d){ m[d.key]=d.value; }); return m; }
function priorYearKey(key){ var p=key.split("-"); return (Number(p[0])-1)+"-"+p[1]; }
function priorMonthKey(key){ var p=key.split("-"); var y=Number(p[0]), m=Number(p[1])-1; if(m===0){ m=12; y-=1; } return y+"-"+pad2(m); }
// Compare to the same calendar month a year earlier (by name, not by position),
// so a missing month — e.g. the canceled October 2025 CPI — doesn't shift the math.
function yoy(a){ var m=indexByKey(a); return a.map(function(d){ var b=m[priorYearKey(d.key)]; return (b!=null && b) ? { key:d.key, date:d.date, value:(d.value/b - 1)*100 } : null; }).filter(Boolean); }
function mom(a){ var m=indexByKey(a); return a.map(function(d){ var b=m[priorMonthKey(d.key)]; return (b!=null && b) ? { key:d.key, date:d.date, value:(d.value/b - 1)*100 } : null; }).filter(Boolean); }
function diff(a){ var m=indexByKey(a); return a.map(function(d){ var b=m[priorMonthKey(d.key)]; return (b!=null) ? { key:d.key, date:d.date, value:d.value - b } : null; }).filter(Boolean); }
function mergeByKey(named){
  var map = {};
  named.forEach(function(s){ s.data.forEach(function(d){
    if (!map[d.key]) map[d.key] = { key:d.key, date:d.date };
    map[d.key][s.name] = d.value;
  }); });
  return Object.keys(map).map(function(k){ return map[k]; }).sort(function(a,b){ return a.date - b.date; });
}
function tail(a,n){ return a.length > n ? a.slice(a.length - n) : a; }
function last(a){ return a.length ? a[a.length-1] : null; }
function prev(a){ return a.length > 1 ? a[a.length-2] : null; }

function fmtPct(v,d){ d=(d==null?1:d); return (v==null||!isFinite(v)) ? "\u2014" : v.toFixed(d) + "%"; }
function fmtSignedPct(v,d){ d=(d==null?1:d); return (v==null||!isFinite(v)) ? "\u2014" : (v>=0?"+":"") + v.toFixed(d) + "%"; }
function fmtJobs(v){ return (v==null||!isFinite(v)) ? "\u2014" : (v>=0?"+":"\u2212") + Math.abs(Math.round(v)).toLocaleString() + "K"; }
function fmtMonth(key){ if(!key) return "\u2014"; var p=key.split("-"); return MONTHS[Number(p[1])-1] + " " + p[0]; }

function buildModel(raw){
  function g(id){ return parseSeries(raw, SERIES[id]); }
  var headNSA=g("cpiHeadlineNSA"), headSA=g("cpiHeadlineSA"), coreNSA=g("cpiCoreNSA"), coreSA=g("cpiCoreSA");
  var unrate=g("unrate"), payrolls=g("payrolls"), ahe=g("ahe"), part=g("partRate");
  var headlineYoY=yoy(headNSA), coreYoY=yoy(coreNSA), headlineMoM=mom(headSA), coreMoM=mom(coreSA);
  var payrollChange=diff(payrolls), wageYoY=yoy(ahe);
  var inflation = mergeByKey([
    {name:"headlineYoY",data:headlineYoY},{name:"coreYoY",data:coreYoY},
    {name:"headlineMoM",data:headlineMoM},{name:"coreMoM",data:coreMoM}]);
  var labor = mergeByKey([{name:"unrate",data:unrate},{name:"part",data:part}]);
  var wages = mergeByKey([{name:"wage",data:wageYoY},{name:"cpi",data:headlineYoY}]);
  var w=last(wageYoY), c=last(headlineYoY);
  var realWage = (w && c) ? (w.value - c.value) : null;
  return {
    inflation:inflation, labor:labor, wages:wages, payrollChange:payrollChange,
    headlineYoY:headlineYoY, coreYoY:coreYoY, unrate:unrate, wageYoY:wageYoY, part:part, realWage:realWage,
    latest:{
      headlineYoY:last(headlineYoY), headlineYoYPrev:prev(headlineYoY), coreYoY:last(coreYoY), coreYoYPrev:prev(coreYoY),
      unrate:last(unrate), unratePrev:prev(unrate), payroll:last(payrollChange), payrollPrev:prev(payrollChange),
      wage:last(wageYoY), wagePrev:prev(wageYoY), part:last(part), partPrev:prev(part)
    }
  };
}
function buildKpis(m){
  var L=m.latest;
  function sp(arr){ return tail(arr,24).map(function(d){ return d.value; }); }
  function d(cur,prv){ return (cur && prv) ? (cur.value - prv.value) : null; }
  return [
    { id:"cpi", label:"Headline inflation", source:"BLS \u00b7 CPI", val:L.headlineYoY?L.headlineYoY.value:null, fmt:fmtPct, delta:d(L.headlineYoY,L.headlineYoYPrev), pol:"down", dsuf:"", spark:sp(m.headlineYoY), color:C.blue, asof:"12-mo rate \u00b7 "+fmtMonth(L.headlineYoY&&L.headlineYoY.key) },
    { id:"core", label:"Core inflation", source:"BLS \u00b7 CPI", val:L.coreYoY?L.coreYoY.value:null, fmt:fmtPct, delta:d(L.coreYoY,L.coreYoYPrev), pol:"down", dsuf:"", spark:sp(m.coreYoY), color:C.clay, asof:"ex food & energy \u00b7 "+fmtMonth(L.coreYoY&&L.coreYoY.key) },
    { id:"jobs", label:"Jobs added", source:"BLS \u00b7 CES", val:L.payroll?L.payroll.value:null, fmt:fmtJobs, delta:(L.payroll&&L.payrollPrev)?(L.payroll.value-L.payrollPrev.value):null, pol:"up", dsuf:"K", spark:tail(m.payrollChange,24).map(function(x){return x.value;}), color:C.blue, asof:"nonfarm payrolls \u00b7 "+fmtMonth(L.payroll&&L.payroll.key) },
    { id:"unrate", label:"Unemployment rate", source:"BLS \u00b7 CPS", val:L.unrate?L.unrate.value:null, fmt:fmtPct, delta:d(L.unrate,L.unratePrev), pol:"down", dsuf:"", spark:sp(m.unrate), color:C.bad, asof:"seasonally adj. \u00b7 "+fmtMonth(L.unrate&&L.unrate.key) },
    { id:"wage", label:"Wage growth", source:"BLS \u00b7 CES", val:L.wage?L.wage.value:null, fmt:fmtPct, delta:d(L.wage,L.wagePrev), pol:"up", dsuf:"", spark:sp(m.wageYoY), color:C.blue, asof:"avg hourly earnings \u00b7 "+fmtMonth(L.wage&&L.wage.key) },
    { id:"part", label:"Labor participation", source:"BLS \u00b7 CPS", val:L.part?L.part.value:null, fmt:fmtPct, delta:d(L.part,L.partPrev), pol:"up", dsuf:"", spark:sp(m.part), color:C.blue, asof:"seasonally adj. \u00b7 "+fmtMonth(L.part&&L.part.key) }
  ];
}

/* ----------------------------- chart math ----------------------------- */
function niceNum(range, round){
  var exp = Math.floor(Math.log(range)/Math.LN10);
  var frac = range / Math.pow(10, exp), nf;
  if (round) nf = frac<1.5?1:frac<3?2:frac<7?5:10;
  else nf = frac<=1?1:frac<=2?2:frac<=5?5:10;
  return nf * Math.pow(10, exp);
}
function niceBounds(min, max){
  if (!isFinite(min)||!isFinite(max)) return { min:0, max:1, ticks:[0,1] };
  if (min === max) { min -= 0.5; max += 0.5; }
  var range = niceNum(max - min, false);
  var step = niceNum(range / 3, true);
  var nmin = Math.floor(min/step)*step, nmax = Math.ceil(max/step)*step;
  var ticks = [];
  for (var v=nmin; v<=nmax+step*0.5; v+=step) ticks.push(Math.round(v*100)/100);
  return { min:nmin, max:nmax, ticks:ticks };
}
function boundsFor(rows, keys, extra){
  var vals = [];
  rows.forEach(function(r){ keys.forEach(function(k){ var v=r[k]; if (v!=null && isFinite(v)) vals.push(v); }); });
  if (extra) extra.forEach(function(e){ if (e!=null) vals.push(e); });
  if (!vals.length) return niceBounds(0,1);
  return niceBounds(Math.min.apply(null,vals), Math.max.apply(null,vals));
}
function esc(s){ return String(s); }

/* ----------------------------- chart drawing ----------------------------- */
function drawLineChart(container, opts){
  var rows = opts.rows, lines = opts.lines;
  var W = container.clientWidth || 700, H = opts.height || 320;
  var left = 46, right = opts.dual ? 48 : 14, top = 12, bottom = 24;
  var pw = W - left - right, ph = H - top - bottom, n = rows.length;
  function xAt(i){ return n<=1 ? left+pw/2 : left + (i/(n-1))*pw; }
  var leftKeys = lines.filter(function(l){ return l.axis!=="r"; }).map(function(l){ return l.key; });
  var rightKeys = lines.filter(function(l){ return l.axis==="r"; }).map(function(l){ return l.key; });
  var lb = boundsFor(rows, leftKeys, opts.refLine?[opts.refLine.y]:null);
  var rb = opts.dual ? boundsFor(rows, rightKeys) : lb;
  function yL(v){ return top + (1-(v-lb.min)/(lb.max-lb.min))*ph; }
  function yR(v){ return top + (1-(v-rb.min)/(rb.max-rb.min))*ph; }

  var s = '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
  lb.ticks.forEach(function(t){ var y=yL(t);
    s += '<line x1="'+left+'" y1="'+y+'" x2="'+(W-right)+'" y2="'+y+'" stroke="'+C.hair+'"/>';
    s += '<text x="'+(left-6)+'" y="'+(y+3)+'" text-anchor="end" font-family="'+MONO+'" font-size="11" fill="'+C.faint+'">'+opts.leftFmt(t)+'</text>';
  });
  if (opts.dual) rb.ticks.forEach(function(t){ var y=yR(t);
    s += '<text x="'+(W-right+6)+'" y="'+(y+3)+'" text-anchor="start" font-family="'+MONO+'" font-size="11" fill="'+C.faint+'">'+opts.rightFmt(t)+'</text>';
  });
  rows.forEach(function(r,i){ if (r.key.slice(5)==="01"){ var x=xAt(i);
    s += '<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" font-family="'+MONO+'" font-size="11" fill="'+C.faint+'">\u2019'+r.key.slice(2,4)+'</text>';
  }});
  if (opts.refLine){ var ry=yL(opts.refLine.y);
    s += '<line x1="'+left+'" y1="'+ry+'" x2="'+(W-right)+'" y2="'+ry+'" stroke="'+C.good+'" stroke-dasharray="4 4" stroke-opacity="0.7"/>';
    s += '<text x="'+(W-right)+'" y="'+(ry-5)+'" text-anchor="end" font-family="'+MONO+'" font-size="10" fill="'+C.good+'">'+opts.refLine.label+'</text>';
  }
  lines.forEach(function(l){ var yf = l.axis==="r"?yR:yL; var d="", pen=false;
    rows.forEach(function(r,i){ var v=r[l.key]; if (v==null||!isFinite(v)){ pen=false; return; }
      d += (pen?"L":"M") + xAt(i).toFixed(1) + " " + yf(v).toFixed(1) + " "; pen=true; });
    s += '<path d="'+d+'" fill="none" stroke="'+l.color+'" stroke-width="2"/>';
  });
  s += '<line class="guide" x1="0" y1="'+top+'" x2="0" y2="'+(H-bottom)+'" stroke="'+C.blueSoft+'" stroke-opacity="0"/>';
  s += "</svg>";
  container.innerHTML = s + '<div class="chart-tip" style="opacity:0"></div>';
  attachHover(container, { W:W, n:n, left:left, right:W-right, top:top, xAt:xAt, rows:rows, lines:lines });
}

function drawBarChart(container, opts){
  var rows = opts.rows, key = opts.key, W = container.clientWidth || 700, H = opts.height || 220;
  var left = 46, right = 14, top = 12, bottom = 24;
  var pw = W-left-right, ph = H-top-bottom, n = rows.length;
  function xAt(i){ return n<=1 ? left+pw/2 : left + (i/(n-1))*pw; }
  var b = boundsFor(rows, [key], [0]);
  function y(v){ return top + (1-(v-b.min)/(b.max-b.min))*ph; }
  var bw = Math.max(1, (pw/Math.max(n,1))*0.66);
  var s = '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
  b.ticks.forEach(function(t){ var yy=y(t);
    s += '<line x1="'+left+'" y1="'+yy+'" x2="'+(W-right)+'" y2="'+yy+'" stroke="'+C.hair+'"/>';
    s += '<text x="'+(left-6)+'" y="'+(yy+3)+'" text-anchor="end" font-family="'+MONO+'" font-size="11" fill="'+C.faint+'">'+opts.leftFmt(t)+'</text>';
  });
  rows.forEach(function(r,i){ if (r.key.slice(5)==="01"){ var x=xAt(i);
    s += '<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" font-family="'+MONO+'" font-size="11" fill="'+C.faint+'">\u2019'+r.key.slice(2,4)+'</text>';
  }});
  var y0 = y(0);
  rows.forEach(function(r,i){ var v=r[key]; if (v==null||!isFinite(v)) return;
    var yv=y(v), x=xAt(i)-bw/2; var ry=Math.min(yv,y0), rh=Math.abs(yv-y0);
    s += '<rect x="'+x.toFixed(1)+'" y="'+ry.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(0,rh).toFixed(1)+'" rx="1.5" fill="'+C.blue+'"/>';
  });
  s += '<line x1="'+left+'" y1="'+y0+'" x2="'+(W-right)+'" y2="'+y0+'" stroke="'+C.hair+'"/>';
  s += '<line class="guide" x1="0" y1="'+top+'" x2="0" y2="'+(H-bottom)+'" stroke="'+C.blueSoft+'" stroke-opacity="0"/>';
  s += "</svg>";
  container.innerHTML = s + '<div class="chart-tip" style="opacity:0"></div>';
  attachHover(container, { W:W, n:n, left:left, right:W-right, top:top, xAt:xAt, rows:rows,
    lines:[{ key:key, name:opts.name, color:C.blue, fmt:opts.tipFmt }] });
}

function attachHover(container, ctx){
  var svg = container.querySelector("svg");
  var guide = container.querySelector(".guide");
  var tip = container.querySelector(".chart-tip");
  function move(ev){
    var rect = svg.getBoundingClientRect();
    var scale = ctx.W / rect.width;
    var mx = (ev.clientX - rect.left) * scale;
    var span = ctx.right - ctx.left;
    var i = ctx.n<=1 ? 0 : Math.round((mx - ctx.left) / span * (ctx.n - 1));
    if (i < 0) i = 0; if (i > ctx.n-1) i = ctx.n-1;
    var gx = ctx.xAt(i);
    guide.setAttribute("x1", gx); guide.setAttribute("x2", gx); guide.setAttribute("stroke-opacity", "0.4");
    var html = '<div class="tip-h">' + fmtMonth(ctx.rows[i].key) + '</div>';
    ctx.lines.forEach(function(l){ var v = ctx.rows[i][l.key];
      html += '<div class="tip-r"><span class="tip-dot" style="background:'+l.color+'"></span><span>'+l.name+'</span><span class="tip-v">'+(v==null?"\u2014":l.fmt(v))+'</span></div>';
    });
    tip.innerHTML = html; tip.style.opacity = "1";
    var tw = tip.offsetWidth, lx = (gx*(rect.width/ctx.W)) + 12;
    if (lx + tw > rect.width) lx = (gx*(rect.width/ctx.W)) - 12 - tw;
    if (lx < 0) lx = 0;
    tip.style.left = lx + "px"; tip.style.top = ctx.top + "px";
  }
  function leave(){ guide.setAttribute("stroke-opacity","0"); tip.style.opacity = "0"; }
  svg.addEventListener("mousemove", move);
  svg.addEventListener("mouseleave", leave);
  svg.addEventListener("touchstart", function(e){ if(e.touches[0]) move(e.touches[0]); }, {passive:true});
  svg.addEventListener("touchmove", function(e){ if(e.touches[0]) move(e.touches[0]); }, {passive:true});
}

function sparkSVG(values, color){
  if (!values || !values.length) return "";
  var W=100, H=34, mn=Math.min.apply(null,values), mx=Math.max.apply(null,values);
  if (mn===mx){ mn-=1; mx+=1; }
  var n=values.length;
  function x(i){ return n<=1?0:(i/(n-1))*W; }
  function y(v){ return 2 + (1-(v-mn)/(mx-mn))*(H-4); }
  var line="", area="", pen=false;
  values.forEach(function(v,i){ var px=x(i).toFixed(1), py=y(v).toFixed(1);
    line += (pen?"L":"M")+px+" "+py+" "; pen=true; });
  area = "M0 "+H+" L"+line.replace(/^M/,"").trim()+" L"+W+" "+H+" Z";
  var id = "g"+Math.random().toString(36).slice(2,8);
  return '<svg width="100%" height="34" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.22"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    '<path d="'+area+'" fill="url(#'+id+')"/>'+
    '<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>';
}

/* ----------------------------- icons ----------------------------- */
function ico(paths, size){ size=size||16; return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>'; }
var ICON = {
  refresh: function(cls){ return '<svg class="'+(cls||"")+'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v4h-4"/></svg>'; },
  up: ico('<line x1="7" y1="17" x2="17" y2="7"/><polyline points="8 7 17 7 17 16"/>', 13),
  down: ico('<line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 8 17 17 8 17"/>', 13),
  alert: ico('<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>', 18)
};

/* ----------------------------- render ----------------------------- */
function deltaHTML(value, pol, suf){
  if (value==null || !isFinite(value)) return "";
  var rising = value > 0, improving = pol==="up" ? rising : !rising;
  var color = value===0 ? C.muted : (improving ? C.good : C.bad);
  var icon = value===0 ? "" : (rising ? ICON.up : ICON.down);
  var num = (value>=0?"+":"\u2212") + Math.abs(value).toFixed(suf==="K"?0:2) + suf;
  return '<span class="delta" style="color:'+color+'">'+icon+num+'</span>';
}
function kpiHTML(k, idx){
  return '<div class="card rise" style="animation-delay:'+(idx*60)+'ms">'+
    '<div class="kpi-top"><span class="eyebrow">'+k.label+'</span><span class="kpi-src">'+k.source+'</span></div>'+
    '<div class="kpi-val">'+k.fmt(k.val)+'</div>'+
    '<div class="kpi-delta">'+deltaHTML(k.delta,k.pol,k.dsuf)+'<span class="lbl">vs prior month</span></div>'+
    '<div class="spark">'+sparkSVG(k.spark,k.color)+'</div>'+
    '<div class="kpi-asof">'+k.asof+'</div></div>';
}
function segHTML(group, opts, val){
  return '<div class="seg" data-seg="'+group+'">'+opts.map(function(o){
    return '<button data-val="'+o.v+'" class="'+(String(o.v)===String(val)?"on":"")+'">'+o.l+'</button>';
  }).join("")+'</div>';
}
function rangeSeg(){ return segHTML("range",[{v:24,l:"2Y"},{v:60,l:"5Y"},{v:120,l:"10Y"}], state.range); }
function legendHTML(items){ return '<div class="legend">'+items.map(function(it){ return '<span><i style="background:'+it.c+'"></i>'+it.t+'</span>'; }).join("")+'</div>'; }

function panelHTML(){
  var t = state.tab;
  var ctrls, body, legend;
  if (t==="inflation"){
    ctrls = segHTML("mode",[{v:"yoy",l:"12-month"},{v:"mom",l:"Monthly"}], state.inflMode) + rangeSeg();
    body = '<div class="chart" id="chart-infl" style="height:320px"></div>';
    legend = legendHTML([{c:C.blue,t:"Headline (all items)"},{c:C.clay,t:"Core (ex food & energy)"}]);
  } else if (t==="jobs"){
    ctrls = '<span class="ctrl-note">Monthly change in nonfarm payrolls</span>' + rangeSeg();
    body = '<div class="chart" id="chart-pay" style="height:220px"></div>'+
      '<div class="ctrl-note" style="margin:14px 0 6px">Unemployment &amp; labor-force participation rates</div>'+
      '<div class="chart" id="chart-labor" style="height:200px"></div>';
    legend = legendHTML([{c:C.bad,t:"Unemployment (left)"},{c:C.blue,t:"Participation (right)"}]);
  } else {
    var rw = state.model ? state.model.realWage : null;
    ctrls = '<span class="ctrl-note">Wage growth vs. inflation, 12-month change</span>' + rangeSeg();
    body = (rw!=null ? '<div class="ctrl-note" style="margin:2px 0 8px">Latest real (inflation-adjusted) wage growth: <span style="font-family:'+MONO+';font-weight:600;color:'+(rw>=0?C.good:C.bad)+'">'+fmtSignedPct(rw)+'</span></div>' : '')+
      '<div class="chart" id="chart-wage" style="height:320px"></div>';
    legend = legendHTML([{c:C.blue,t:"Avg hourly earnings"},{c:C.clay,t:"Headline CPI"}]);
  }
  var tabs = [["inflation","Inflation"],["jobs","Jobs"],["wages","Wages"]].map(function(x){
    return '<button class="tab '+(state.tab===x[0]?"on":"")+'" data-tab="'+x[0]+'">'+x[1]+'</button>';
  }).join("");
  return '<section class="card main">'+
    '<div class="tabs">'+tabs+'</div>'+
    '<div class="ctrl-row">'+ctrls+'</div>'+
    body + legend +
    (readoutText()? '<p class="readout">'+readoutText()+'</p>' : '')+
    '</section>';
}
function readoutText(){
  var m=state.model; if(!m) return ""; var L=m.latest;
  if (state.tab==="inflation" && L.headlineYoY)
    return "Consumer prices rose "+fmtPct(L.headlineYoY.value)+" over the year through "+fmtMonth(L.headlineYoY.key)+"; the core rate, which strips out food and energy, ran at "+fmtPct(L.coreYoY&&L.coreYoY.value)+".";
  if (state.tab==="jobs" && L.payroll)
    return "Employers added "+fmtJobs(L.payroll.value)+" jobs in "+fmtMonth(L.payroll.key)+", with the unemployment rate at "+fmtPct(L.unrate&&L.unrate.value)+" and participation at "+fmtPct(L.part&&L.part.value)+".";
  if (state.tab==="wages" && L.wage)
    return "Average hourly earnings grew "+fmtPct(L.wage.value)+" over the year through "+fmtMonth(L.wage.key)+" \u2014 "+(m.realWage>=0?"ahead of":"behind")+" inflation by "+fmtSignedPct(m.realWage)+" in real terms.";
  return "";
}

function render(){
  var root = document.getElementById("root");
  var updated = state.updatedAt ? '<span style="font-family:'+MONO+';font-size:11px;color:'+C.faint+'">Fetched '+state.updatedAt.toLocaleString([], {dateStyle:"medium", timeStyle:"short"})+'</span>' : "";
  var header = '<header class="head"><div>'+
    '<div class="eyebrow"><span class="dot"></span> U.S. Economic Indicators \u00b7 Live</div>'+
    '<h1>The latest official data, charted as it\u2019s released</h1>'+
    '<p>Inflation, jobs, and wages pulled straight from the U.S. Bureau of Labor Statistics \u2014 ready to read, compare, and share.</p>'+
    '</div><div class="head-meta">'+
    '<button class="refresh" id="refresh" '+(state.status==="loading"?"disabled":"")+'>'+ICON.refresh(state.status==="loading"?"spin":"")+(state.status==="loading"?"Updating\u2026":"Refresh")+'</button>'+
    updated + '</div></header>';

  var err = "";
  if (state.status==="error"){
    err = '<div class="errbox"><span style="color:'+C.bad+'">'+ICON.alert+'</span><div>'+
      '<h3>Couldn\u2019t reach the data feed</h3>'+
      '<p>'+esc(state.errMsg)+'. This is usually momentary \u2014 give it a second and retry.</p>'+
      '<div class="row"><button class="refresh" id="retry">Retry</button></div>'+
      '</div></div>';
  }

  var kpis;
  if (state.status==="loading" && !state.model){
    kpis = '<section class="kpis">'+Array.apply(null,{length:6}).map(function(){ return '<div class="card skeleton"></div>'; }).join("")+'</section>';
  } else {
    kpis = '<section class="kpis">'+state.kpis.map(function(k,i){ return kpiHTML(k,i); }).join("")+'</section>';
  }

  var panel = (state.model ? panelHTML() : "");

  var foot = '<footer class="foot"><div class="foot-grid">'+
    '<div><div class="eyebrow">Live in this dashboard</div><p class="foot-p">Consumer Price Index, the Employment Situation (payrolls, unemployment, participation), and average hourly earnings \u2014 all from the <a class="link" href="https://www.bls.gov/developers/" target="_blank" rel="noreferrer">BLS Public Data API \u2197</a>. Series are seasonally adjusted except the 12-month CPI rates, which follow BLS convention and use the unadjusted index.</p></div>'+
    '<div><div class="eyebrow">Coming with a small proxy</div><p class="foot-p">GDP and PCE inflation (<a class="link" href="https://apps.bea.gov/api/" target="_blank" rel="noreferrer">BEA \u2197</a>), and retail sales, housing, and trade (<a class="link" href="https://www.census.gov/data/developers.html" target="_blank" rel="noreferrer">Census \u2197</a>) need an API key and a server, so they slot in once a lightweight proxy is added.</p></div>'+
    '</div><div class="foot-note">Figures are official releases and may be revised. Built for clear public commentary \u2014 rename and rebrand freely.</div></footer>';

  root.innerHTML = '<div class="wrap">'+header+err+kpis+panel+foot+'</div>';
  root.dataset.ok = "1";
  wire();
  requestAnimationFrame(drawCharts);
}

function drawCharts(){
  try {
    var m = state.model; if (!m) return;
    var rng = state.range;
    if (state.tab==="inflation"){
      var c = document.getElementById("chart-infl"); if (!c) return;
      var yoy = state.inflMode!=="mom";
      drawLineChart(c, { rows:tail(m.inflation,rng),
        lines:[ {key:yoy?"headlineYoY":"headlineMoM", name:"Headline CPI", color:C.blue, fmt:fmtPct},
                {key:yoy?"coreYoY":"coreMoM", name:"Core CPI", color:C.clay, fmt:fmtPct} ],
        leftFmt:function(v){ return v+"%"; }, refLine: yoy ? {y:2, label:"Fed 2% target"} : null });
    } else if (state.tab==="jobs"){
      var cp = document.getElementById("chart-pay");
      if (cp) drawBarChart(cp, { rows:tail(m.payrollChange,rng), key:"value", name:"Jobs added",
        leftFmt:function(v){ return v+"K"; }, tipFmt:fmtJobs });
      var cl = document.getElementById("chart-labor");
      if (cl) drawLineChart(cl, { rows:tail(m.labor,rng), height:200, dual:true,
        lines:[ {key:"unrate", name:"Unemployment", color:C.bad, fmt:fmtPct, axis:"l"},
                {key:"part", name:"Participation", color:C.blue, fmt:fmtPct, axis:"r"} ],
        leftFmt:function(v){ return v+"%"; }, rightFmt:function(v){ return v+"%"; } });
    } else {
      var cw = document.getElementById("chart-wage"); if (!cw) return;
      drawLineChart(cw, { rows:tail(m.wages,rng),
        lines:[ {key:"wage", name:"Avg hourly earnings", color:C.blue, fmt:fmtPct},
                {key:"cpi", name:"Headline CPI", color:C.clay, fmt:fmtPct} ],
        leftFmt:function(v){ return v+"%"; } });
    }
  } catch (e) { /* keep the rest of the page alive even if a chart fails */ }
}

function wire(){
  var rf = document.getElementById("refresh");
  if (rf) rf.addEventListener("click", function(){ load(); });
  var retry = document.getElementById("retry");
  if (retry) retry.addEventListener("click", function(){ load(); });
  document.querySelectorAll(".tab").forEach(function(b){
    b.addEventListener("click", function(){ state.tab = b.getAttribute("data-tab"); render(); });
  });
  document.querySelectorAll('.seg[data-seg="range"] button').forEach(function(b){
    b.addEventListener("click", function(){ state.range = Number(b.getAttribute("data-val")); render(); });
  });
  document.querySelectorAll('.seg[data-seg="mode"] button').forEach(function(b){
    b.addEventListener("click", function(){ state.inflMode = b.getAttribute("data-val"); render(); });
  });
}

var resizeT;
window.addEventListener("resize", function(){ clearTimeout(resizeT); resizeT = setTimeout(drawCharts, 150); });

function load(){
  state.status = "loading"; state.errMsg = ""; render();
  fetchData().then(function(series){
    state.raw = series; state.model = buildModel(series); state.kpis = buildKpis(state.model);
    state.updatedAt = new Date(); state.status = "ok"; render();
  }).catch(function(e){
    state.errMsg = (e && e.message) ? e.message : "Could not reach the data service.";
    state.status = "error"; render();
  });
}

load();
</script>
</body>
</html>
