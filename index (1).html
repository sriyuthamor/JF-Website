<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U.S. Economic Indicators</title>
  <meta name="description" content="The latest official U.S. inflation, jobs, and wage data, charted as it's released." />
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #F5F6F8; }
  </style>
  <!-- Libraries loaded from a CDN; nothing to install. -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
  const { useState, useEffect, useMemo, useRef } = React;
  const { createRoot } = ReactDOM;
  const {
    LineChart, Line, BarChart, Bar, AreaChart, Area,
    XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine,
  } = Recharts;

  /* ----------------------------- inline icons ----------------------------- */
  const Ico = (props) => (
    <svg width={props.size || 16} height={props.size || 16} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={props.className}>{props.children}</svg>
  );
  const RefreshCw = (p) => <Ico {...p}><path d="M21 12a9 9 0 1 1-2.64-6.36" /><path d="M21 4v4h-4" /></Ico>;
  const ArrowUpRight = (p) => <Ico {...p}><line x1="7" y1="17" x2="17" y2="7" /><polyline points="8 7 17 7 17 16" /></Ico>;
  const ArrowDownRight = (p) => <Ico {...p}><line x1="7" y1="7" x2="17" y2="17" /><polyline points="17 8 17 17 8 17" /></Ico>;
  const AlertTriangle = (p) => <Ico {...p}><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></Ico>;
  const ExternalLink = (p) => <Ico {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></Ico>;

  const C = {
    bg: "#F5F6F8", panel: "#FFFFFF", ink: "#13161D", muted: "#626B7B", faint: "#8A92A1",
    hair: "#E5E8ED", blue: "#1B3B6F", blueSoft: "#5B7DB1", clay: "#B45309",
    good: "#0B7A4B", bad: "#B42318", live: "#0B7A4B",
  };
  const FONT = {
    display: 'Georgia, "Iowan Old Style", "Times New Roman", serif',
    mono: 'ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace',
    body: 'system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
  };

  const SERIES = {
    cpiHeadlineNSA: "CUUR0000SA0", cpiHeadlineSA: "CUSR0000SA0",
    cpiCoreNSA: "CUUR0000SA0L1E", cpiCoreSA: "CUSR0000SA0L1E",
    unrate: "LNS14000000", payrolls: "CES0000000001",
    ahe: "CES0500000003", partRate: "LNS11300000",
  };
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const prefersReduced = () => window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ----------------------------- data fetching ----------------------------- */
  async function fetchBls(apiKey) {
    const endyear = new Date().getFullYear();
    const startyear = endyear - 10;
    const body = { seriesid: Object.values(SERIES), startyear: String(startyear), endyear: String(endyear) };
    if (apiKey) body.registrationkey = apiKey.trim();
    const version = apiKey ? "v2" : "v1";
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 15000);
    let res;
    try {
      res = await fetch(`https://api.bls.gov/publicAPI/${version}/timeseries/data/`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body), signal: ctrl.signal,
      });
    } finally { clearTimeout(timer); }
    if (!res.ok) throw new Error(`BLS API returned ${res.status}`);
    const json = await res.json();
    if (json.status !== "REQUEST_SUCCEEDED")
      throw new Error((json.message && json.message.join(" ")) || "request was not successful");
    return json.Results.series;
  }

  function parseSeries(seriesArr, id) {
    const s = seriesArr.find((x) => x.seriesID === id);
    if (!s) return [];
    return s.data
      .filter((d) => /^M(0[1-9]|1[0-2])$/.test(d.period))
      .map((d) => {
        const m = parseInt(d.period.slice(1), 10);
        return { key: `${d.year}-${String(m).padStart(2, "0")}`, date: new Date(Number(d.year), m - 1, 1), value: parseFloat(d.value) };
      })
      .filter((d) => Number.isFinite(d.value))
      .sort((a, b) => a.date - b.date);
  }
  const yoy = (a) => a.map((d, i) => (i >= 12 && a[i - 12].value ? { ...d, value: (d.value / a[i - 12].value - 1) * 100 } : null)).filter(Boolean);
  const mom = (a) => a.map((d, i) => (i >= 1 && a[i - 1].value ? { ...d, value: (d.value / a[i - 1].value - 1) * 100 } : null)).filter(Boolean);
  const diff = (a) => a.map((d, i) => (i >= 1 ? { ...d, value: d.value - a[i - 1].value } : null)).filter(Boolean);
  function mergeByKey(named) {
    const map = new Map();
    named.forEach(({ name, data }) => data.forEach((d) => {
      const e = map.get(d.key) || { key: d.key, date: d.date }; e[name] = d.value; map.set(d.key, e);
    }));
    return [...map.values()].sort((a, b) => a.date - b.date);
  }
  const tail = (arr, n) => (arr.length > n ? arr.slice(arr.length - n) : arr);

  const fmtPct = (v, d = 1) => (v == null || !Number.isFinite(v) ? "—" : `${v.toFixed(d)}%`);
  const fmtSignedPct = (v, d = 1) => (v == null || !Number.isFinite(v) ? "—" : `${v >= 0 ? "+" : ""}${v.toFixed(d)}%`);
  const fmtJobs = (v) => (v == null || !Number.isFinite(v) ? "—" : `${v >= 0 ? "+" : "−"}${Math.abs(Math.round(v)).toLocaleString()}K`);
  const fmtMonth = (key) => { if (!key) return "—"; const [y, m] = key.split("-"); return `${MONTHS[Number(m) - 1]} ${y}`; };
  const shortTick = (key) => { const [y, m] = key.split("-"); return m === "01" ? `'${y.slice(2)}` : ""; };
  const janTicks = (rows) => rows.filter((r) => r.key.endsWith("-01")).map((r) => r.key);

  function useCountUp(target, active, duration = 650) {
    const [val, setVal] = useState(target);
    useEffect(() => {
      if (target == null || !Number.isFinite(target)) { setVal(target); return; }
      if (!active || prefersReduced()) { setVal(target); return; }
      let raf; const t0 = performance.now();
      const tick = (t) => { const p = Math.min(1, (t - t0) / duration); const e = 1 - Math.pow(1 - p, 3); setVal(target * e); if (p < 1) raf = requestAnimationFrame(tick); else setVal(target); };
      raf = requestAnimationFrame(tick); return () => cancelAnimationFrame(raf);
    }, [target, active, duration]);
    return val;
  }

  function Eyebrow({ children, style }) {
    return <div style={{ fontFamily: FONT.mono, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: C.faint, ...style }}>{children}</div>;
  }
  function Delta({ value, polarity = "up", suffix = "" }) {
    if (value == null || !Number.isFinite(value)) return null;
    const rising = value > 0;
    const improving = polarity === "up" ? rising : !rising;
    const color = value === 0 ? C.muted : improving ? C.good : C.bad;
    const Icon = rising ? ArrowUpRight : ArrowDownRight;
    return (
      <span style={{ display: "inline-flex", alignItems: "center", gap: 3, color, fontFamily: FONT.mono, fontSize: 12.5, fontVariantNumeric: "tabular-nums" }}>
        {value !== 0 && <Icon size={13} />}
        {`${value >= 0 ? "+" : "−"}${Math.abs(value).toFixed(suffix === "K" ? 0 : 2)}${suffix}`}
      </span>
    );
  }
  function Sparkline({ data, color }) {
    return (
      <div style={{ height: 34, width: "100%" }}>
        <ResponsiveContainer>
          <AreaChart data={data} margin={{ top: 3, right: 0, bottom: 0, left: 0 }}>
            <defs><linearGradient id={`sp-${color}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity={0.22} /><stop offset="100%" stopColor={color} stopOpacity={0} />
            </linearGradient></defs>
            <Area type="monotone" dataKey="value" stroke={color} strokeWidth={1.5} fill={`url(#sp-${color})`} dot={false} isAnimationActive={false} />
          </AreaChart>
        </ResponsiveContainer>
      </div>
    );
  }
  function KpiCard({ kpi, animate, delay }) {
    const display = useCountUp(kpi.value, animate);
    return (
      <div className="card rise" style={{ animationDelay: `${delay}ms` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <Eyebrow>{kpi.label}</Eyebrow>
          <span style={{ fontFamily: FONT.mono, fontSize: 10.5, color: C.faint }}>{kpi.source}</span>
        </div>
        <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginTop: 10 }}>
          <span style={{ fontFamily: FONT.mono, fontVariantNumeric: "tabular-nums", fontSize: 34, lineHeight: 1, fontWeight: 600, color: C.ink, letterSpacing: "-0.01em" }}>{kpi.format(display)}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8, height: 16 }}>
          <Delta value={kpi.delta} polarity={kpi.polarity} suffix={kpi.deltaSuffix} />
          <span style={{ fontFamily: FONT.body, fontSize: 12, color: C.muted }}>{kpi.deltaLabel}</span>
        </div>
        <div style={{ marginTop: 12 }}><Sparkline data={kpi.spark} color={kpi.color} /></div>
        <div style={{ marginTop: 6, fontFamily: FONT.mono, fontSize: 10.5, color: C.faint }}>{kpi.asof}</div>
      </div>
    );
  }
  function ChartTip({ active, payload, label, fmt }) {
    if (!active || !payload || !payload.length) return null;
    return (
      <div style={{ background: "#fff", border: `1px solid ${C.hair}`, borderRadius: 8, padding: "8px 10px", boxShadow: "0 6px 24px rgba(19,22,29,0.10)", fontFamily: FONT.body }}>
        <div style={{ fontFamily: FONT.mono, fontSize: 11, color: C.muted, marginBottom: 4 }}>{fmtMonth(label)}</div>
        {payload.map((p) => (
          <div key={p.dataKey} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12.5 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: p.color }} />
            <span style={{ color: C.muted }}>{p.name}</span>
            <span style={{ marginLeft: "auto", fontFamily: FONT.mono, fontVariantNumeric: "tabular-nums", color: C.ink }}>{fmt(p.value)}</span>
          </div>
        ))}
      </div>
    );
  }
  function Segmented({ options, value, onChange, ariaLabel }) {
    return (
      <div role="group" aria-label={ariaLabel} className="seg">
        {options.map((o) => (
          <button key={o.value} onClick={() => onChange(o.value)} aria-pressed={value === o.value} className={`seg-btn ${value === o.value ? "seg-on" : ""}`}>{o.label}</button>
        ))}
      </div>
    );
  }
  const axisProps = { tick: { fontFamily: FONT.mono, fontSize: 11, fill: C.faint }, tickLine: false, axisLine: { stroke: C.hair } };
  function Legend({ items }) {
    return (
      <div style={{ display: "flex", gap: 18, flexWrap: "wrap", marginTop: 10 }}>
        {items.map((i) => (
          <span key={i.t} style={{ display: "inline-flex", alignItems: "center", gap: 7, fontFamily: FONT.body, fontSize: 12.5, color: C.muted }}>
            <span style={{ width: 14, height: 3, borderRadius: 2, background: i.c }} />{i.t}
          </span>
        ))}
      </div>
    );
  }
  function RangeControl({ range, setRange }) {
    return <Segmented ariaLabel="Time range" options={[{ label: "2Y", value: 24 }, { label: "5Y", value: 60 }, { label: "10Y", value: 120 }]} value={range} onChange={setRange} />;
  }

  function InflationPanel({ data, ticks, range, setRange }) {
    const [mode, setMode] = useState("yoy");
    const headlineKey = mode === "yoy" ? "headlineYoY" : "headlineMoM";
    const coreKey = mode === "yoy" ? "coreYoY" : "coreMoM";
    return (
      <div>
        <div className="ctrl-row">
          <Segmented ariaLabel="Inflation measure" options={[{ label: "12-month", value: "yoy" }, { label: "Monthly", value: "mom" }]} value={mode} onChange={setMode} />
          <RangeControl range={range} setRange={setRange} />
        </div>
        <div style={{ height: 320, marginTop: 6 }}>
          <ResponsiveContainer>
            <LineChart data={data} margin={{ top: 8, right: 8, left: -8, bottom: 0 }}>
              <CartesianGrid stroke={C.hair} vertical={false} />
              <XAxis dataKey="key" ticks={ticks} tickFormatter={shortTick} {...axisProps} />
              <YAxis tickFormatter={(v) => `${v}%`} {...axisProps} width={46} />
              {mode === "yoy" && <ReferenceLine y={2} stroke={C.good} strokeDasharray="4 4" strokeOpacity={0.7} label={{ value: "Fed 2% target", position: "insideTopRight", fontSize: 10, fill: C.good, fontFamily: FONT.mono }} />}
              <Tooltip content={(p) => <ChartTip {...p} fmt={(v) => fmtPct(v)} />} />
              <Line name="Headline CPI" type="monotone" dataKey={headlineKey} stroke={C.blue} strokeWidth={2} dot={false} isAnimationActive={!prefersReduced()} />
              <Line name="Core CPI" type="monotone" dataKey={coreKey} stroke={C.clay} strokeWidth={2} dot={false} isAnimationActive={!prefersReduced()} />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <Legend items={[{ c: C.blue, t: "Headline (all items)" }, { c: C.clay, t: "Core (ex food & energy)" }]} />
      </div>
    );
  }
  function JobsPanel({ payroll, labor, ticks, range, setRange }) {
    return (
      <div>
        <div className="ctrl-row">
          <span style={{ fontFamily: FONT.body, fontSize: 13, color: C.muted }}>Monthly change in nonfarm payrolls</span>
          <RangeControl range={range} setRange={setRange} />
        </div>
        <div style={{ height: 220, marginTop: 6 }}>
          <ResponsiveContainer>
            <BarChart data={payroll} margin={{ top: 8, right: 8, left: -4, bottom: 0 }}>
              <CartesianGrid stroke={C.hair} vertical={false} />
              <XAxis dataKey="key" ticks={ticks} tickFormatter={shortTick} {...axisProps} />
              <YAxis tickFormatter={(v) => `${v}K`} {...axisProps} width={46} />
              <ReferenceLine y={0} stroke={C.hair} />
              <Tooltip cursor={{ fill: "rgba(27,59,111,0.06)" }} content={(p) => <ChartTip {...p} fmt={(v) => fmtJobs(v)} />} />
              <Bar name="Jobs added" dataKey="value" fill={C.blue} radius={[2, 2, 0, 0]} isAnimationActive={!prefersReduced()} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{ fontFamily: FONT.body, fontSize: 13, color: C.muted, margin: "14px 0 6px" }}>Unemployment &amp; labor-force participation rates</div>
        <div style={{ height: 200 }}>
          <ResponsiveContainer>
            <LineChart data={labor} margin={{ top: 6, right: 8, left: -8, bottom: 0 }}>
              <CartesianGrid stroke={C.hair} vertical={false} />
              <XAxis dataKey="key" ticks={ticks} tickFormatter={shortTick} {...axisProps} />
              <YAxis yAxisId="u" tickFormatter={(v) => `${v}%`} {...axisProps} width={46} domain={["auto", "auto"]} />
              <YAxis yAxisId="p" orientation="right" tickFormatter={(v) => `${v}%`} {...axisProps} width={46} domain={["auto", "auto"]} />
              <Tooltip content={(p) => <ChartTip {...p} fmt={(v) => fmtPct(v)} />} />
              <Line yAxisId="u" name="Unemployment" type="monotone" dataKey="unrate" stroke={C.bad} strokeWidth={2} dot={false} isAnimationActive={!prefersReduced()} />
              <Line yAxisId="p" name="Participation" type="monotone" dataKey="part" stroke={C.blue} strokeWidth={2} dot={false} isAnimationActive={!prefersReduced()} />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <Legend items={[{ c: C.bad, t: "Unemployment (left)" }, { c: C.blue, t: "Participation (right)" }]} />
      </div>
    );
  }
  function WagesPanel({ data, ticks, range, setRange, realWage }) {
    return (
      <div>
        <div className="ctrl-row">
          <span style={{ fontFamily: FONT.body, fontSize: 13, color: C.muted }}>Wage growth vs. inflation, 12-month change</span>
          <RangeControl range={range} setRange={setRange} />
        </div>
        {realWage != null && (
          <div style={{ fontFamily: FONT.body, fontSize: 13, color: C.muted, margin: "2px 0 8px" }}>
            Latest real (inflation-adjusted) wage growth:&nbsp;
            <span style={{ fontFamily: FONT.mono, color: realWage >= 0 ? C.good : C.bad, fontWeight: 600 }}>{fmtSignedPct(realWage)}</span>
          </div>
        )}
        <div style={{ height: 320, marginTop: 2 }}>
          <ResponsiveContainer>
            <LineChart data={data} margin={{ top: 8, right: 8, left: -8, bottom: 0 }}>
              <CartesianGrid stroke={C.hair} vertical={false} />
              <XAxis dataKey="key" ticks={ticks} tickFormatter={shortTick} {...axisProps} />
              <YAxis tickFormatter={(v) => `${v}%`} {...axisProps} width={46} />
              <Tooltip content={(p) => <ChartTip {...p} fmt={(v) => fmtPct(v)} />} />
              <Line name="Avg hourly earnings" type="monotone" dataKey="wage" stroke={C.blue} strokeWidth={2} dot={false} isAnimationActive={!prefersReduced()} />
              <Line name="Headline CPI" type="monotone" dataKey="cpi" stroke={C.clay} strokeWidth={2} dot={false} isAnimationActive={!prefersReduced()} />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <Legend items={[{ c: C.blue, t: "Avg hourly earnings" }, { c: C.clay, t: "Headline CPI" }]} />
      </div>
    );
  }

  function App() {
    const [raw, setRaw] = useState(null);
    const [status, setStatus] = useState("loading");
    const [errMsg, setErrMsg] = useState("");
    const [tab, setTab] = useState("inflation");
    const [range, setRange] = useState(60);
    const [apiKey, setApiKey] = useState("");
    const [updatedAt, setUpdatedAt] = useState(null);
    const animatedOnce = useRef(false);

    const load = async (key) => {
      setStatus("loading"); setErrMsg("");
      try { const series = await fetchBls(key); setRaw(series); setUpdatedAt(new Date()); setStatus("ok"); }
      catch (e) { setErrMsg(e.message || "Could not reach the BLS API."); setStatus("error"); }
    };
    useEffect(() => { load(""); }, []);

    const model = useMemo(() => {
      if (!raw) return null;
      const get = (id) => parseSeries(raw, SERIES[id]);
      const cpiHeadNSA = get("cpiHeadlineNSA"), cpiHeadSA = get("cpiHeadlineSA");
      const cpiCoreNSA = get("cpiCoreNSA"), cpiCoreSA = get("cpiCoreSA");
      const unrate = get("unrate"), payrolls = get("payrolls"), ahe = get("ahe"), part = get("partRate");
      const headlineYoY = yoy(cpiHeadNSA), coreYoY = yoy(cpiCoreNSA);
      const headlineMoM = mom(cpiHeadSA), coreMoM = mom(cpiCoreSA);
      const payrollChange = diff(payrolls), wageYoY = yoy(ahe);
      const inflation = mergeByKey([{ name: "headlineYoY", data: headlineYoY }, { name: "coreYoY", data: coreYoY }, { name: "headlineMoM", data: headlineMoM }, { name: "coreMoM", data: coreMoM }]);
      const labor = mergeByKey([{ name: "unrate", data: unrate }, { name: "part", data: part }]);
      const wages = mergeByKey([{ name: "wage", data: wageYoY }, { name: "cpi", data: headlineYoY }]);
      const last = (a) => (a.length ? a[a.length - 1] : null);
      const prev = (a) => (a.length > 1 ? a[a.length - 2] : null);
      const realWage = (() => { const w = last(wageYoY), c = last(headlineYoY); return w && c ? w.value - c.value : null; })();
      return {
        inflation, labor, wages, payrollChange, headlineYoY, coreYoY, unrate, payrollChangeArr: payrollChange, wageYoY, part, realWage,
        latest: {
          headlineYoY: last(headlineYoY), headlineYoYPrev: prev(headlineYoY), coreYoY: last(coreYoY), coreYoYPrev: prev(coreYoY),
          unrate: last(unrate), unratePrev: prev(unrate), payroll: last(payrollChange), payrollPrev: prev(payrollChange),
          wage: last(wageYoY), wagePrev: prev(wageYoY), part: last(part), partPrev: prev(part),
        },
      };
    }, [raw]);

    const kpis = useMemo(() => {
      if (!model) return [];
      const L = model.latest; const sp = (arr) => tail(arr, 24);
      const d = (cur, prv) => (cur && prv ? cur.value - prv.value : null);
      return [
        { id: "cpi", label: "Headline inflation", source: "BLS · CPI", value: L.headlineYoY?.value, format: (v) => fmtPct(v), delta: d(L.headlineYoY, L.headlineYoYPrev), polarity: "down", deltaSuffix: "", deltaLabel: "vs prior month", color: C.blue, spark: sp(model.headlineYoY), asof: `12-mo rate · ${fmtMonth(L.headlineYoY?.key)}` },
        { id: "core", label: "Core inflation", source: "BLS · CPI", value: L.coreYoY?.value, format: (v) => fmtPct(v), delta: d(L.coreYoY, L.coreYoYPrev), polarity: "down", deltaSuffix: "", deltaLabel: "vs prior month", color: C.clay, spark: sp(model.coreYoY), asof: `ex food & energy · ${fmtMonth(L.coreYoY?.key)}` },
        { id: "jobs", label: "Jobs added", source: "BLS · CES", value: L.payroll?.value, format: (v) => fmtJobs(v), delta: (L.payroll && L.payrollPrev) ? L.payroll.value - L.payrollPrev.value : null, polarity: "up", deltaSuffix: "K", deltaLabel: "vs prior month", color: C.blue, spark: sp(model.payrollChangeArr), asof: `nonfarm payrolls · ${fmtMonth(L.payroll?.key)}` },
        { id: "unrate", label: "Unemployment rate", source: "BLS · CPS", value: L.unrate?.value, format: (v) => fmtPct(v), delta: d(L.unrate, L.unratePrev), polarity: "down", deltaSuffix: "", deltaLabel: "vs prior month", color: C.bad, spark: sp(model.unrate), asof: `seasonally adj. · ${fmtMonth(L.unrate?.key)}` },
        { id: "wage", label: "Wage growth", source: "BLS · CES", value: L.wage?.value, format: (v) => fmtPct(v), delta: d(L.wage, L.wagePrev), polarity: "up", deltaSuffix: "", deltaLabel: "vs prior month", color: C.blue, spark: sp(model.wageYoY), asof: `avg hourly earnings · ${fmtMonth(L.wage?.key)}` },
        { id: "part", label: "Labor participation", source: "BLS · CPS", value: L.part?.value, format: (v) => fmtPct(v), delta: d(L.part, L.partPrev), polarity: "up", deltaSuffix: "", deltaLabel: "vs prior month", color: C.blue, spark: sp(model.part), asof: `seasonally adj. · ${fmtMonth(L.part?.key)}` },
      ];
    }, [model]);

    const animate = status === "ok" && !animatedOnce.current;
    useEffect(() => { if (status === "ok") animatedOnce.current = true; }, [status]);

    const ranged = useMemo(() => {
      if (!model) return null;
      return { inflation: tail(model.inflation, range), labor: tail(model.labor, range), wages: tail(model.wages, range), payroll: tail(model.payrollChange, range) };
    }, [model, range]);

    const readout = useMemo(() => {
      if (!model) return "";
      const L = model.latest;
      if (tab === "inflation" && L.headlineYoY) return `Consumer prices rose ${fmtPct(L.headlineYoY.value)} over the year through ${fmtMonth(L.headlineYoY.key)}; the core rate, which strips out food and energy, ran at ${fmtPct(L.coreYoY?.value)}.`;
      if (tab === "jobs" && L.payroll) return `Employers added ${fmtJobs(L.payroll.value)} jobs in ${fmtMonth(L.payroll.key)}, with the unemployment rate at ${fmtPct(L.unrate?.value)} and participation at ${fmtPct(L.part?.value)}.`;
      if (tab === "wages" && L.wage) return `Average hourly earnings grew ${fmtPct(L.wage.value)} over the year through ${fmtMonth(L.wage.key)} — ${model.realWage >= 0 ? "ahead of" : "behind"} inflation by ${fmtSignedPct(model.realWage)} in real terms.`;
      return "";
    }, [model, tab]);

    return (
      <div style={{ background: C.bg, minHeight: "100%", fontFamily: FONT.body, color: C.ink }}>
        <style>{css}</style>
        <div className="wrap">
          <header className="head">
            <div>
              <Eyebrow style={{ display: "flex", alignItems: "center", gap: 8 }}><span className="dot" /> U.S. Economic Indicators · Live</Eyebrow>
              <h1 style={{ fontFamily: FONT.display, fontWeight: 600, fontSize: 30, lineHeight: 1.08, margin: "10px 0 4px", letterSpacing: "-0.01em" }}>The latest official data, charted as it's released</h1>
              <p style={{ fontFamily: FONT.body, fontSize: 14.5, color: C.muted, margin: 0, maxWidth: 620 }}>Inflation, jobs, and wages pulled straight from the U.S. Bureau of Labor Statistics — ready to read, compare, and share.</p>
            </div>
            <div className="head-meta">
              <button className="refresh" onClick={() => load(apiKey)} disabled={status === "loading"}>
                <RefreshCw size={14} className={status === "loading" ? "spin" : ""} />{status === "loading" ? "Updating…" : "Refresh"}
              </button>
              {updatedAt && <span style={{ fontFamily: FONT.mono, fontSize: 11, color: C.faint }}>Fetched {updatedAt.toLocaleString([], { dateStyle: "medium", timeStyle: "short" })}</span>}
            </div>
          </header>

          {status === "error" && (
            <div className="card" style={{ borderColor: "#F0C9C4", background: "#FCF4F3", marginTop: 18 }}>
              <div style={{ display: "flex", gap: 10 }}>
                <AlertTriangle size={18} />
                <div>
                  <div style={{ fontWeight: 600, color: C.ink, marginBottom: 4 }}>Couldn't reach the BLS data feed</div>
                  <div style={{ fontSize: 13.5, color: C.muted, lineHeight: 1.5 }}>{errMsg}. This is usually a temporary network or rate-limit issue. Try again, or add a free BLS API key to raise the limit.</div>
                  <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                    <input className="key-input" placeholder="Optional BLS API key" value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
                    <button className="refresh" onClick={() => load(apiKey)}>Retry</button>
                    <a className="link" href="https://data.bls.gov/registrationEngine/" target="_blank" rel="noreferrer">Get a key <ExternalLink size={12} /></a>
                  </div>
                </div>
              </div>
            </div>
          )}

          <section className="kpis">
            {status === "loading" && !model
              ? Array.from({ length: 6 }).map((_, i) => <div key={i} className="card skeleton" style={{ height: 168 }} />)
              : kpis.map((k, i) => <KpiCard key={k.id} kpi={k} animate={animate} delay={i * 60} />)}
          </section>

          {model && ranged && (
            <section className="card main">
              <div className="tabs" role="tablist">
                {[{ id: "inflation", t: "Inflation" }, { id: "jobs", t: "Jobs" }, { id: "wages", t: "Wages" }].map((x) => (
                  <button key={x.id} role="tab" aria-selected={tab === x.id} className={`tab ${tab === x.id ? "tab-on" : ""}`} onClick={() => setTab(x.id)}>{x.t}</button>
                ))}
              </div>
              {tab === "inflation" && <InflationPanel data={ranged.inflation} ticks={janTicks(ranged.inflation)} range={range} setRange={setRange} />}
              {tab === "jobs" && <JobsPanel payroll={ranged.payroll} labor={ranged.labor} ticks={janTicks(ranged.labor)} range={range} setRange={setRange} />}
              {tab === "wages" && <WagesPanel data={ranged.wages} ticks={janTicks(ranged.wages)} range={range} setRange={setRange} realWage={model.realWage} />}
              {readout && <p className="readout">{readout}</p>}
            </section>
          )}

          <footer className="foot">
            <div className="foot-grid">
              <div>
                <Eyebrow>Live in this dashboard</Eyebrow>
                <p className="foot-p">Consumer Price Index, the Employment Situation (payrolls, unemployment, participation), and average hourly earnings — all from the <a className="link" href="https://www.bls.gov/developers/" target="_blank" rel="noreferrer">BLS Public Data API <ExternalLink size={11} /></a>. Series are seasonally adjusted except the 12-month CPI rates, which follow BLS convention and use the unadjusted index.</p>
              </div>
              <div>
                <Eyebrow>Coming with a small proxy</Eyebrow>
                <p className="foot-p">GDP and PCE inflation (<a className="link" href="https://apps.bea.gov/api/" target="_blank" rel="noreferrer">BEA <ExternalLink size={11} /></a>), and retail sales, housing, and trade (<a className="link" href="https://www.census.gov/data/developers.html" target="_blank" rel="noreferrer">Census <ExternalLink size={11} /></a>) need an API key and a server, so they slot in once a lightweight proxy is added.</p>
              </div>
            </div>
            <div className="foot-note">Figures are official releases and may be revised. Built for clear public commentary — rename and rebrand freely.</div>
          </footer>
        </div>
      </div>
    );
  }

  const css = `
    * { box-sizing: border-box; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 34px 22px 60px; }
    .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
    .head-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: ${C.live}; animation: pulse 2.4s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(11,122,75,0.45);} 70%{ box-shadow:0 0 0 7px rgba(11,122,75,0);} 100%{box-shadow:0 0 0 0 rgba(11,122,75,0);} }
    .refresh { display:inline-flex; align-items:center; gap:7px; font-family:${FONT.body}; font-size:13px; font-weight:500; color:${C.ink}; background:#fff; border:1px solid ${C.hair}; border-radius:8px; padding:8px 13px; cursor:pointer; transition:border-color .15s, background .15s; }
    .refresh:hover { border-color:${C.blueSoft}; }
    .refresh:disabled { opacity:.6; cursor:default; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg);} }
    .kpis { display:grid; grid-template-columns: repeat(auto-fit, minmax(248px,1fr)); gap:14px; margin-top:26px; }
    .card { background:${C.panel}; border:1px solid ${C.hair}; border-radius:14px; padding:18px 18px 16px; }
    .main { margin-top:16px; padding:8px 20px 22px; }
    .skeleton { background:linear-gradient(100deg,#fff 30%, #eef1f5 50%, #fff 70%); background-size:200% 100%; animation:sk 1.3s infinite; }
    @keyframes sk { to { background-position:-200% 0; } }
    .rise { opacity:0; transform: translateY(8px); animation: rise .5s ease forwards; }
    @keyframes rise { to { opacity:1; transform:none; } }
    .tabs { display:flex; gap:4px; border-bottom:1px solid ${C.hair}; margin:0 -20px 18px; padding:8px 20px 0; }
    .tab { font-family:${FONT.body}; font-size:14px; font-weight:500; color:${C.muted}; background:none; border:none; padding:9px 4px; margin-right:18px; cursor:pointer; border-bottom:2px solid transparent; transition:color .15s; }
    .tab:hover { color:${C.ink}; }
    .tab-on { color:${C.blue}; border-bottom-color:${C.blue}; }
    .ctrl-row { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:6px; }
    .seg { display:inline-flex; background:#F0F2F6; border-radius:9px; padding:3px; gap:2px; }
    .seg-btn { font-family:${FONT.mono}; font-size:12px; letter-spacing:.02em; color:${C.muted}; background:none; border:none; padding:6px 12px; border-radius:7px; cursor:pointer; transition: all .15s; }
    .seg-btn:hover { color:${C.ink}; }
    .seg-on { background:#fff; color:${C.blue}; box-shadow:0 1px 2px rgba(19,22,29,.08); font-weight:600; }
    .readout { font-family:${FONT.display}; font-size:16px; line-height:1.5; color:${C.ink}; border-left:3px solid ${C.blue}; padding-left:14px; margin:22px 0 4px; }
    .foot { margin-top:34px; border-top:1px solid ${C.hair}; padding-top:22px; }
    .foot-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap:28px; }
    .foot-p { font-family:${FONT.body}; font-size:13px; line-height:1.6; color:${C.muted}; margin:8px 0 0; }
    .foot-note { font-family:${FONT.body}; font-size:12px; color:${C.faint}; margin-top:22px; }
    .link { color:${C.blue}; text-decoration:none; font-weight:500; display:inline-flex; align-items:center; gap:3px; }
    .link:hover { text-decoration:underline; }
    .key-input { font-family:${FONT.mono}; font-size:12.5px; padding:8px 11px; border:1px solid ${C.hair}; border-radius:8px; min-width:200px; outline:none; }
    .key-input:focus { border-color:${C.blueSoft}; }
    button:focus-visible, .key-input:focus-visible, a:focus-visible { outline:2px solid ${C.blueSoft}; outline-offset:2px; }
    @media (prefers-reduced-motion: reduce) { .rise, .dot, .spin, .skeleton { animation:none !important; opacity:1 !important; transform:none !important; } }
    @media (max-width:560px) { .head-meta { align-items:flex-start; } h1 { font-size:25px !important; } }
  `;

  createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
